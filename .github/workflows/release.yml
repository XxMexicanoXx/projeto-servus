name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versão do instalador (ex: 1.0.0). Sem prefixo 'v'."
        required: false
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $tag = "${{ github.ref_name }}"
            $version = $tag.TrimStart("v")
          } else {
            $version = "${{ github.event.inputs.version }}"
            if ([string]::IsNullOrWhiteSpace($version)) { $version = "1.0.0" }
          }
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "Building version: $version"

      - name: Patch installer.iss with version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $iss = Get-Content -Path installer.iss -Raw
          $iss = $iss -replace '(?m)^#define\s+MyAppVersion\s+"[^"]*"', "#define MyAppVersion     `"$version`""
          Set-Content -Path installer.iss -Value $iss -Encoding UTF8
          Select-String -Path installer.iss -Pattern '#define MyAppVersion'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build standalone .exe (PyInstaller)
        shell: pwsh
        run: |
          pyinstaller assistant.spec --clean --noconfirm
          if (-not (Test-Path "dist\VozAssistente.exe")) {
            throw "PyInstaller não gerou dist\VozAssistente.exe"
          }
          Get-Item dist\VozAssistente.exe | Select-Object Name, Length

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $env:Path = "$env:Path;C:\Program Files (x86)\Inno Setup 6"
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer_output | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Qp installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit $LASTEXITCODE" }
          Get-ChildItem installer_output

      - name: Compute SHA256
        id: hash
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $exe = "installer_output\VozAssistente-Setup-$version.exe"
          $sha = (Get-FileHash -Algorithm SHA256 $exe).Hash.ToLower()
          $size = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          echo "sha256=$sha"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "size_mb=$size" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "exe=$exe"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "$sha  VozAssistente-Setup-$version.exe" | Out-File -FilePath "installer_output\SHA256SUMS.txt" -Encoding ascii

      - name: Upload build artifact (sempre disponível na aba Actions)
        uses: actions/upload-artifact@v4
        with:
          name: VozAssistente-Setup-${{ steps.version.outputs.version }}
          path: |
            installer_output/VozAssistente-Setup-*.exe
            installer_output/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (apenas em push de tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VozAssistente ${{ steps.version.outputs.version }}
          body: |
            ## VozAssistente ${{ steps.version.outputs.version }}

            Instalador Windows (x64) — assistente pessoal por voz pt-BR, 100% local.

            **Tamanho:** ${{ steps.hash.outputs.size_mb }} MB
            **SHA-256:** `${{ steps.hash.outputs.sha256 }}`

            ### Instalação
            1. Baixe `VozAssistente-Setup-${{ steps.version.outputs.version }}.exe` abaixo
            2. Execute (não precisa de admin)
            3. Wizard em pt-BR — escolha as opções (atalhos, autostart)
            4. Pronto: ícone na bandeja do sistema, fala "Assistente pronto."

            ### Comandos suportados
            Ver [README](https://github.com/${{ github.repository }}/blob/main/README.md#comandos-suportados-exemplos).

            ### Configuração
            Após instalado, edite `%APPDATA%\VozAssistente\config.json` (ou use o atalho
            "VozAssistente (Editar configuração)" no Menu Iniciar) para apontar caminhos
            de programas (Chrome, Spotify) e ajustar microfone/threshold.
          files: |
            installer_output/VozAssistente-Setup-*.exe
            installer_output/SHA256SUMS.txt
          draft: false
          prerelease: false
