<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="60%" stop-color="#0f1f33"/>
      <stop offset="100%" stop-color="#070d18"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde08a"/>
      <stop offset="40%" stop-color="#f4c560"/>
      <stop offset="100%" stop-color="#a87420"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff1bf"/>
      <stop offset="100%" stop-color="#8b5a14"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- subtle inner border -->
  <rect x="14" y="14" width="484" height="484" rx="86" ry="86"
        fill="none" stroke="#f4c560" stroke-opacity="0.18" stroke-width="2"/>

  <!-- laurel wreath: left branch -->
  <g filter="url(#softShadow)">
    <g transform="translate(96 256)">
      <!-- arc spine -->
      <path d="M 0 160 Q -50 0 60 -160" fill="none" stroke="url(#goldStroke)" stroke-width="6" stroke-linecap="round"/>
      <!-- leaves left side (outer) -->
      <g fill="url(#goldGrad)" stroke="#7a4d12" stroke-width="1.2">
        <ellipse cx="-22" cy="128" rx="22" ry="9" transform="rotate(-30 -22 128)"/>
        <ellipse cx="-34" cy="92" rx="24" ry="9.5" transform="rotate(-25 -34 92)"/>
        <ellipse cx="-42" cy="54" rx="25" ry="10" transform="rotate(-18 -42 54)"/>
        <ellipse cx="-46" cy="14" rx="26" ry="10" transform="rotate(-8 -46 14)"/>
        <ellipse cx="-44" cy="-26" rx="25" ry="10" transform="rotate(4 -44 -26)"/>
        <ellipse cx="-36" cy="-66" rx="24" ry="9.5" transform="rotate(18 -36 -66)"/>
        <ellipse cx="-22" cy="-104" rx="22" ry="9" transform="rotate(32 -22 -104)"/>
        <ellipse cx="-2" cy="-138" rx="20" ry="8.5" transform="rotate(48 -2 -138)"/>
      </g>
      <!-- leaves left side (inner, smaller) -->
      <g fill="url(#goldGrad)" stroke="#7a4d12" stroke-width="1" opacity="0.88">
        <ellipse cx="14" cy="128" rx="16" ry="6.5" transform="rotate(40 14 128)"/>
        <ellipse cx="2" cy="92" rx="17" ry="7" transform="rotate(45 2 92)"/>
        <ellipse cx="-6" cy="54" rx="18" ry="7" transform="rotate(50 -6 54)"/>
        <ellipse cx="-10" cy="14" rx="18" ry="7" transform="rotate(58 -10 14)"/>
        <ellipse cx="-8" cy="-26" rx="18" ry="7" transform="rotate(70 -8 -26)"/>
        <ellipse cx="0" cy="-66" rx="17" ry="7" transform="rotate(82 0 -66)"/>
        <ellipse cx="14" cy="-104" rx="16" ry="6.5" transform="rotate(98 14 -104)"/>
      </g>
    </g>
  </g>

  <!-- laurel wreath: right branch (mirrored) -->
  <g filter="url(#softShadow)">
    <g transform="translate(416 256) scale(-1 1)">
      <path d="M 0 160 Q -50 0 60 -160" fill="none" stroke="url(#goldStroke)" stroke-width="6" stroke-linecap="round"/>
      <g fill="url(#goldGrad)" stroke="#7a4d12" stroke-width="1.2">
        <ellipse cx="-22" cy="128" rx="22" ry="9" transform="rotate(-30 -22 128)"/>
        <ellipse cx="-34" cy="92" rx="24" ry="9.5" transform="rotate(-25 -34 92)"/>
        <ellipse cx="-42" cy="54" rx="25" ry="10" transform="rotate(-18 -42 54)"/>
        <ellipse cx="-46" cy="14" rx="26" ry="10" transform="rotate(-8 -46 14)"/>
        <ellipse cx="-44" cy="-26" rx="25" ry="10" transform="rotate(4 -44 -26)"/>
        <ellipse cx="-36" cy="-66" rx="24" ry="9.5" transform="rotate(18 -36 -66)"/>
        <ellipse cx="-22" cy="-104" rx="22" ry="9" transform="rotate(32 -22 -104)"/>
        <ellipse cx="-2" cy="-138" rx="20" ry="8.5" transform="rotate(48 -2 -138)"/>
      </g>
      <g fill="url(#goldGrad)" stroke="#7a4d12" stroke-width="1" opacity="0.88">
        <ellipse cx="14" cy="128" rx="16" ry="6.5" transform="rotate(40 14 128)"/>
        <ellipse cx="2" cy="92" rx="17" ry="7" transform="rotate(45 2 92)"/>
        <ellipse cx="-6" cy="54" rx="18" ry="7" transform="rotate(50 -6 54)"/>
        <ellipse cx="-10" cy="14" rx="18" ry="7" transform="rotate(58 -10 14)"/>
        <ellipse cx="-8" cy="-26" rx="18" ry="7" transform="rotate(70 -8 -26)"/>
        <ellipse cx="0" cy="-66" rx="17" ry="7" transform="rotate(82 0 -66)"/>
        <ellipse cx="14" cy="-104" rx="16" ry="6.5" transform="rotate(98 14 -104)"/>
      </g>
    </g>
  </g>

  <!-- center "S" monogram -->
  <g filter="url(#softShadow)">
    <text x="256" y="316"
          font-family="Trajan Pro, Cinzel, Georgia, serif"
          font-size="280"
          font-weight="700"
          text-anchor="middle"
          fill="url(#goldGrad)"
          stroke="#7a4d12"
          stroke-width="3"
          letter-spacing="-4">S</text>
  </g>

  <!-- subtle audio wave under the S -->
  <g stroke="url(#goldGrad)" stroke-linecap="round" fill="none" opacity="0.85">
    <line x1="186" y1="372" x2="206" y2="372" stroke-width="6"/>
    <line x1="220" y1="358" x2="240" y2="358" stroke-width="8"/>
    <line x1="252" y1="348" x2="260" y2="348" stroke-width="10"/>
    <line x1="272" y1="358" x2="292" y2="358" stroke-width="8"/>
    <line x1="306" y1="372" x2="326" y2="372" stroke-width="6"/>
  </g>
</svg>
